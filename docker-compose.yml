services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: raglab
      POSTGRES_USER: raglab
      POSTGRES_PASSWORD: raglab
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raglab -d raglab"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  docling:
    image: quay.io/docling-project/docling-serve-cpu:latest
    profiles: ["docling"]
    environment:
      DOCLING_SERVE_ENABLE_UI: "1"
    ports:
      - "5001:5001"
    volumes:
      - docling_data:/var/lib/docling

volumes:
  docling_data:
  postgres_data:
  qdrant_storage:
